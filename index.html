<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>戳破烦恼 · 收藏温暖</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo">🎈</div>
        <div class="title">
          <div class="name">戳破烦恼 · 收藏温暖</div>
          <div class="sub">点击气球，爆掉压力，收下治愈</div>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">今日爆破</div>
          <div class="value" id="todayCount">0</div>
        </div>
        <div class="stat">
          <div class="label">连续天数</div>
          <div class="value" id="streak">0</div>
        </div>
      </div>
    </header>

    <main class="stage" id="stage">
      <div class="stars"></div>

      <div class="balloon" id="balloon" aria-label="balloon">
        <div class="balloon-body"></div>
        <div class="balloon-knot"></div>
        <div class="balloon-string"></div>
      </div>

      <div class="hint" id="hint">点一下气球 💥</div>

      <div class="toast" id="toast" hidden>
        <div class="quote" id="quote"></div>
        <div class="actions">
          <button class="btn ghost" id="againBtn">再爆一个</button>
          <button class="btn" id="posterBtn">生成分享图</button>
        </div>
      </div>

      <div class="panel" id="rankPanel" hidden>
        <div class="panel-hd">
          <div class="panel-title">🏆 本机排行榜</div>
          <button class="icon-btn" id="closeRank">✕</button>
        </div>
        <div class="panel-bd">
          <div class="rank-meta" id="rankMeta"></div>
          <ol class="rank-list" id="rankList"></ol>
        </div>
      </div>

      <button class="float-btn" id="rankBtn">🏆 排行榜</button>
    </main>

    <footer class="footer">
      <div class="tiny">
        小提示：生成分享图后「保存图片」发朋友圈/群聊，会更容易传播。
      </div>
    </footer>
  </div>

  <!-- 海报弹层 -->
  <div class="modal" id="posterModal" hidden>
    <div class="modal-card">
      <div class="modal-hd">
        <div class="modal-title">📸 朋友圈分享图</div>
        <button class="icon-btn" id="closePoster">✕</button>
      </div>
      <div class="modal-bd">
        <canvas id="posterCanvas" width="900" height="1200"></canvas>
        <div class="modal-actions">
          <button class="btn ghost" id="downloadPoster">保存图片</button>
          <button class="btn" id="copyLink">复制游戏链接</button>
        </div>
        <div class="small" id="copyTip"></div>
      </div>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
