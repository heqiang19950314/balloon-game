<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎈 戳破烦恼 · 收获温暖</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg1: #0f0c29; --bg2: #302b63; --bg3: #24243e;
  --accent: #ffc371; --pink: #ff6bc1; --mint: #a8e6cf;
}

body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: linear-gradient(180deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
  font-family: "PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",system-ui,sans-serif;
  cursor: crosshair; user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body.shake { animation: screenShake .3s ease-out; }
@keyframes screenShake {
  0%,100% { transform: translate(0,0); }
  15% { transform: translate(-4px, 3px); }
  30% { transform: translate(3px, -4px); }
  45% { transform: translate(-3px, 2px); }
  60% { transform: translate(4px, -2px); }
  75% { transform: translate(-2px, 3px); }
}
body.mega-shake { animation: megaShake .45s ease-out; }
@keyframes megaShake {
  0%,100% { transform: translate(0,0); }
  10% { transform: translate(-8px, 6px) rotate(-0.5deg); }
  20% { transform: translate(7px, -8px) rotate(0.5deg); }
  30% { transform: translate(-6px, 4px); }
  40% { transform: translate(8px, -3px) rotate(-0.3deg); }
  50% { transform: translate(-5px, 7px); }
  60% { transform: translate(6px, -5px) rotate(0.3deg); }
  70% { transform: translate(-4px, 3px); }
  80% { transform: translate(3px, -4px); }
}

/* ===== Canvas 背景（星空+流星） ===== */
#bgCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ===== 顶部标题 ===== */
.header {
  position: fixed; top: 0; left: 0; right: 0;
  text-align: center; padding: 20px 16px 8px; z-index: 100;
  pointer-events: none;
}
.header h1 {
  font-size: clamp(22px, 5vw, 32px); font-weight: 800;
  background: linear-gradient(135deg, var(--pink), var(--accent), var(--mint));
  background-size: 200% 200%;
  animation: gradientShift 4s ease infinite;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}
@keyframes gradientShift {
  0%,100% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
}
.header .sub {
  color: rgba(255,255,255,.4); font-size: 12px; margin-top: 4px; letter-spacing: 1px;
}

/* ===== 统计面板 ===== */
.stats-panel {
  position: fixed; top: 16px; right: 16px;
  display: flex; gap: 10px; z-index: 100; pointer-events: none;
}
.stat-box {
  background: rgba(255,255,255,.06);
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 16px; padding: 10px 18px;
  color: #fff; text-align: center;
  min-width: 72px;
}
.stat-box .label {
  font-size: 10px; color: rgba(255,255,255,.4);
  letter-spacing: 1.5px; text-transform: uppercase;
}
.stat-box .num {
  font-size: 28px; font-weight: 800; line-height: 1.2;
  transition: transform .15s;
}
.stat-box .num.pop { transform: scale(1.35); }
.stat-box.combo-box { border-color: rgba(255,195,113,.3); }
.stat-box.combo-box .num { color: var(--accent); }

/* ===== 气球 ===== */
.balloon {
  position: absolute; cursor: pointer;
  animation: floatUp var(--speed) linear forwards;
  z-index: 10;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,.3));
  transition: filter .12s, transform .12s;
  will-change: transform;
}
.balloon:hover {
  filter: brightness(1.2) drop-shadow(0 12px 32px rgba(255,255,255,.15));
  transform: scale(1.1);
}
.balloon:active { transform: scale(0.95); }
.balloon svg { width: 100%; height: 100%; }

@keyframes floatUp {
  0%   { transform: translateY(0) rotate(var(--r1)) scale(var(--s,1)); opacity: 1; }
  15%  { transform: translateY(-15vh) rotate(var(--r2)) scale(var(--s,1)); }
  30%  { transform: translateY(-30vh) rotate(var(--r1)) scale(var(--s,1)); }
  50%  { transform: translateY(-50vh) rotate(var(--r3)) scale(var(--s,1)); }
  70%  { transform: translateY(-70vh) rotate(var(--r1)) scale(var(--s,1)); }
  85%  { transform: translateY(-85vh) rotate(var(--r2)) scale(var(--s,1)); }
  100% { transform: translateY(-115vh) rotate(var(--r3)) scale(var(--s,1)); opacity: 0; }
}

/* ===== 爆炸系统 ===== */
.explosion-layer { position: fixed; inset: 0; pointer-events: none; z-index: 50; }

/* 冲击波 */
.shockwave {
  position: absolute; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.5);
  animation: shockwaveExpand .5s ease-out forwards;
  pointer-events: none;
}
@keyframes shockwaveExpand {
  0%   { width: 0; height: 0; opacity: .8; transform: translate(-50%,-50%); }
  100% { width: 200px; height: 200px; opacity: 0; transform: translate(-50%,-50%); }
}
.shockwave.big {
  border-width: 3px;
  animation-name: shockwaveBig;
  border-color: rgba(255,195,113,.6);
}
@keyframes shockwaveBig {
  0%   { width: 0; height: 0; opacity: 1; transform: translate(-50%,-50%); }
  100% { width: 350px; height: 350px; opacity: 0; transform: translate(-50%,-50%); }
}

/* 闪光 */
.flash {
  position: absolute; width: 60px; height: 60px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,.95) 0%, transparent 70%);
  animation: flashPulse .3s ease-out forwards;
  pointer-events: none;
}
@keyframes flashPulse {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 1; }
  50%  { transform: translate(-50%,-50%) scale(2); opacity: .8; }
  100% { transform: translate(-50%,-50%) scale(3); opacity: 0; }
}

/* 粒子 — 圆形 */
.p-circle {
  position: absolute; border-radius: 50%;
  animation: burstOut var(--dur,.6s) cubic-bezier(.15,.6,.35,1) forwards;
}
/* 粒子 — 方形碎片 */
.p-shard {
  position: absolute; border-radius: 2px;
  animation: burstSpin var(--dur,.7s) cubic-bezier(.15,.6,.35,1) forwards;
}
/* 粒子 — 星星 */
.p-star {
  position: absolute;
  animation: burstOut var(--dur,.65s) cubic-bezier(.15,.6,.35,1) forwards;
}
/* 粒子 — 气球碎片 */
.p-fragment {
  position: absolute; border-radius: 40%;
  animation: fragmentFall var(--dur,.9s) ease-in forwards;
}

@keyframes burstOut {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) scale(0); opacity: 0; }
}
@keyframes burstSpin {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translate(var(--tx),var(--ty)) rotate(var(--rot,360deg)) scale(0); opacity: 0; }
}
@keyframes fragmentFall {
  0%   { transform: translate(0,0) rotate(0deg) scale(1); opacity: .9; }
  40%  { opacity: .7; }
  100% { transform: translate(var(--tx), var(--fy,120px)) rotate(var(--rot,180deg)) scale(.3); opacity: 0; }
}

/* 拖尾光线 */
.light-trail {
  position: absolute; width: 2px; border-radius: 1px;
  transform-origin: center top;
  animation: trailFade .4s ease-out forwards;
  pointer-events: none;
}
@keyframes trailFade {
  0%   { height: 0; opacity: .8; }
  40%  { height: var(--len, 30px); opacity: .6; }
  100% { height: var(--len, 30px); opacity: 0; }
}

/* ===== 安慰语卡片 ===== */
.comfort-card {
  position: fixed; left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: rgba(255,255,255,.08);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 28px;
  padding: 36px 40px 28px;
  text-align: center; z-index: 200;
  max-width: 400px; width: 88vw;
  animation: cardIn .5s cubic-bezier(.34,1.56,.64,1) forwards;
  box-shadow: 0 20px 60px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.1);
}
.comfort-card.out { animation: cardOut .3s ease-in forwards; }
@keyframes cardIn {
  0%   { transform: translate(-50%,-50%) scale(0) rotate(-5deg); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(1) rotate(0deg); opacity: 1; }
}
@keyframes cardOut {
  0%   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(.85) translateY(20px); opacity: 0; }
}
.comfort-card .emoji { font-size: 52px; margin-bottom: 12px; }
.comfort-card .category-tag {
  display: inline-block;
  font-size: 11px; color: rgba(255,255,255,.45);
  background: rgba(255,255,255,.08);
  border-radius: 20px; padding: 3px 14px;
  margin-bottom: 14px; letter-spacing: 1px;
}
.comfort-card .text {
  font-size: 19px; line-height: 1.75; color: #fff; font-weight: 500;
}
.comfort-card .author {
  margin-top: 10px; font-size: 12px;
  color: rgba(255,255,255,.3); font-style: italic;
}
.comfort-card .card-actions {
  margin-top: 20px;
  display: flex; gap: 10px; justify-content: center;
  pointer-events: auto;
}
.comfort-card .btn {
  padding: 8px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 600;
  border: none; cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 6px;
}
.comfort-card .btn:active { transform: scale(.95); }
.btn-share {
  background: linear-gradient(135deg, var(--pink), #ff9a76);
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,193,.3);
}
.btn-share:hover { box-shadow: 0 6px 24px rgba(255,107,193,.5); transform: translateY(-1px); }
.btn-close {
  background: rgba(255,255,255,.1);
  color: rgba(255,255,255,.7);
  border: 1px solid rgba(255,255,255,.15);
}
.btn-close:hover { background: rgba(255,255,255,.15); }

/* ===== 连击提示 ===== */
.combo-text {
  position: fixed; pointer-events: none; z-index: 150;
  font-weight: 900; text-shadow: 0 2px 20px var(--glow);
  animation: comboPop .9s ease-out forwards;
}
@keyframes comboPop {
  0%   { transform: translate(-50%,-50%) scale(0) rotate(-10deg); opacity: 0; }
  25%  { transform: translate(-50%,-50%) scale(1.4) rotate(3deg); opacity: 1; }
  50%  { transform: translate(-50%,-50%) scale(1.1) rotate(-1deg); }
  100% { transform: translate(-50%, calc(-50% - 80px)) scale(.9); opacity: 0; }
}

/* ===== 彩带纸屑 ===== */
.confetti {
  position: fixed; z-index: 199; pointer-events: none;
  animation: confettiFall var(--dur) ease-in forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: .8; }
  100% { transform: translateY(105vh) rotate(var(--rot)) scale(.6); opacity: 0; }
}

/* ===== 分享遮罩 ===== */
.share-overlay {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  animation: fadeIn .3s ease;
}
@keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
.share-overlay canvas {
  border-radius: 16px;
  box-shadow: 0 20px 60px rgba(0,0,0,.5);
  max-width: 90vw; max-height: 65vh;
  object-fit: contain;
}
.share-actions {
  display: flex; gap: 12px;
}
.share-actions .btn {
  padding: 12px 28px; border-radius: 24px;
  font-size: 15px; font-weight: 700;
  border: none; cursor: pointer;
  transition: all .2s;
  display: flex; align-items: center; gap: 8px;
}
.share-actions .btn:active { transform: scale(.95); }
.btn-download {
  background: linear-gradient(135deg, #56ab2f, #a8e063);
  color: #fff;
  box-shadow: 0 4px 20px rgba(86,171,47,.4);
}
.btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(86,171,47,.5); }
.btn-back {
  background: rgba(255,255,255,.1);
  color: #fff;
  border: 1px solid rgba(255,255,255,.2);
}
.btn-back:hover { background: rgba(255,255,255,.15); }
.share-tip {
  color: rgba(255,255,255,.5); font-size: 13px; text-align: center;
}

/* ===== 底部引导 ===== */
.guide {
  position: fixed; bottom: 20px; left: 0; right: 0;
  text-align: center; z-index: 100; pointer-events: none;
  animation: guidePulse 3s ease-in-out infinite;
}
.guide span {
  font-size: 13px; color: rgba(255,255,255,.25);
  letter-spacing: 1px;
}
@keyframes guidePulse {
  0%,100% { opacity: .5; } 50% { opacity: 1; }
}

/* ===== 里程碑 ===== */
.milestone {
  position: fixed; left: 50%; top: 35%;
  transform: translate(-50%,-50%) scale(0);
  font-size: 48px; font-weight: 900;
  color: #fff; pointer-events: none; z-index: 180;
  text-shadow: 0 4px 30px rgba(255,195,113,.8);
  animation: milestoneIn 1.2s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes milestoneIn {
  0%   { transform: translate(-50%,-50%) scale(0) rotate(-15deg); opacity: 0; }
  30%  { transform: translate(-50%,-50%) scale(1.3) rotate(3deg); opacity: 1; }
  50%  { transform: translate(-50%,-50%) scale(1) rotate(0deg); }
  100% { transform: translate(-50%,-50%) scale(.8) translateY(-60px); opacity: 0; }
}

/* ===== 移动端适配 ===== */
@media (max-width: 480px) {
  .stats-panel { top: 10px; right: 10px; gap: 6px; }
  .stat-box { padding: 6px 12px; border-radius: 12px; min-width: 58px; }
  .stat-box .num { font-size: 22px; }
  .stat-box .label { font-size: 9px; }
  .header { padding: 14px 12px 6px; }
  .comfort-card { padding: 28px 24px 22px; }
  .comfort-card .text { font-size: 17px; }
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="header">
  <h1>🎈 戳破烦恼 · 收获温暖</h1>
  <div class="sub">点击气球，让烦恼炸裂，让温暖涌来</div>
</div>

<div class="stats-panel">
  <div class="stat-box combo-box" id="comboBox" style="opacity:0;transition:opacity .3s">
    <div class="label">COMBO</div>
    <div class="num" id="comboNum">0</div>
  </div>
  <div class="stat-box">
    <div class="label">POPPED</div>
    <div class="num" id="scoreNum">0</div>
  </div>

<div class="explosion-layer" id="fxLayer"></div>
<div id="game"></div>

<div class="guide"><span>👆 点击气球，戳破你的小烦恼</span></div>

//  星空背景 Canvas
// ═══════════════════════════════════════
const bgCanvas = document.getElementById("bgCanvas");
const bgCtx = bgCanvas.getContext("2d");
let stars = [], shootingStars = [];

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
}
resizeBg();
window.addEventListener("resize", resizeBg);

for (let i = 0; i < 120; i++) {
  stars.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    r: .3 + Math.random() * 1.5,
    a: Math.random(), da: .005 + Math.random() * .015,
    dir: Math.random() > .5 ? 1 : -1
  });
}

function spawnShootingStar() {
  shootingStars.push({
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height * .4,
    vx: 4 + Math.random() * 4,
    vy: 2 + Math.random() * 3,
    life: 1, decay: .015 + Math.random() * .01,
    len: 30 + Math.random() * 50
  });
}
setInterval(spawnShootingStar, 3000 + Math.random() * 4000);

function drawBg() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  // 星星
  for (const s of stars) {
    s.a += s.da * s.dir;
    if (s.a >= 1 || s.a <= .1) s.dir *= -1;
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(255,255,255,${s.a})`;
    bgCtx.fill();
  }
  // 流星
  for (let i = shootingStars.length - 1; i >= 0; i--) {
    const ss = shootingStars[i];
    ss.x += ss.vx; ss.y += ss.vy; ss.life -= ss.decay;
    if (ss.life <= 0) { shootingStars.splice(i, 1); continue; }
    const grad = bgCtx.createLinearGradient(ss.x, ss.y, ss.x - ss.vx * ss.len / 5, ss.y - ss.vy * ss.len / 5);
    grad.addColorStop(0, `rgba(255,255,255,${ss.life})`);
    grad.addColorStop(1, "rgba(255,255,255,0)");
    bgCtx.strokeStyle = grad;
    bgCtx.lineWidth = 1.5;
    bgCtx.beginPath();
    bgCtx.moveTo(ss.x, ss.y);
    bgCtx.lineTo(ss.x - ss.vx * ss.len / 5, ss.y - ss.vy * ss.len / 5);
    bgCtx.stroke();
  }
  requestAnimationFrame(drawBg);
}
drawBg();

let svgIdCounter = 0;
function createBalloonSVG(t) {
  const id = "bg" + (svgIdCounter++);
  return `<svg viewBox="0 0 100 140" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="${id}" cx="35%" cy="28%" r="65%">
        <stop offset="0%" stop-color="${t.shine}"/>
        <stop offset="65%" stop-color="${t.body}"/>
        <stop offset="100%" stop-color="${t.shadow}"/>
      </radialGradient>
      <filter id="f${id}"><feGaussianBlur stdDeviation=".5"/></filter>
    </defs>
    <ellipse cx="50" cy="54" rx="38" ry="46" fill="url(#${id})"/>
    <ellipse cx="38" cy="36" rx="9" ry="13" fill="rgba(255,255,255,.28)" transform="rotate(-25,38,36)"/>
    <ellipse cx="58" cy="30" rx="4" ry="5" fill="rgba(255,255,255,.12)" transform="rotate(-15,58,30)"/>
    <polygon points="50,99 44,110 56,110" fill="${t.shadow}" opacity=".8"/>
    <path d="M50,110 Q48,118 52,125 Q48,132 50,138" stroke="rgba(255,255,255,.35)" stroke-width="1" fill="none"/>
  </svg>`;
}

function spawnBalloon() {

  const size = 55 + Math.random() * 45;
  const el = document.createElement("div");
  el.className = "balloon";
  el.innerHTML = createBalloonSVG(t);
  el.style.width = size + "px";
  el.style.height = (size * 1.4) + "px";
  el.style.left = (5 + Math.random() * 80) + "vw";
  el.style.bottom = -(size * 1.6) + "px";

  const speed = 6 + Math.random() * 7;
  el.style.setProperty("--speed", speed + "s");
  el.style.setProperty("--r1", (Math.random() * 8 - 4) + "deg");
  el.style.setProperty("--r2", (Math.random() * 8 - 4) + "deg");
  el.style.setProperty("--r3", (Math.random() * 8 - 4) + "deg");
  el.style.setProperty("--s", (.9 + Math.random() * .2).toFixed(2));

  el._theme = t;
  el.addEventListener("click", (e) => { e.stopPropagation(); popBalloon(el); });
  el.addEventListener("animationend", () => el.remove());
  game.appendChild(el);
}

// ═══════════════════════════════════════
//  爆炸系统 — 分层粒子
// ═══════════════════════════════════════
function popBalloon(el) {
  const t = el._theme;
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  el.remove();

  // 分数
  score++;
  scoreNum.textContent = score;
  scoreNum.classList.add("pop");
  setTimeout(() => scoreNum.classList.remove("pop"), 160);

  // 连击
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  clearTimeout(comboTimer);
  comboTimer = setTimeout(() => { combo = 0; comboBox.style.opacity = "0"; }, 2000);
  comboNum.textContent = combo;
  if (combo >= 2) {
    comboBox.style.opacity = "1";
    comboNum.classList.add("pop");
    setTimeout(() => comboNum.classList.remove("pop"), 160);
  }

  // 震屏
  document.body.classList.remove("shake","mega-shake");
  void document.body.offsetWidth; // force reflow
  document.body.classList.add(combo >= 8 ? "mega-shake" : "shake");
  setTimeout(() => document.body.classList.remove("shake","mega-shake"), 450);

  // 连击文字
  if (combo >= 3) showComboText(cx, cy, combo);

  // 里程碑
  if ([10,25,50,100].includes(score)) showMilestone(score);

  // === 爆炸视觉 ===
  const colors = [t.body, t.shine, t.shadow, "#fff", "#ffe0ec"];

  // 1) 闪光
  createEl("flash", fxLayer, { left: cx+"px", top: cy+"px" });

  // 2) 冲击波
  createEl("shockwave" + (combo >= 6 ? " big" : ""), fxLayer, { left: cx+"px", top: cy+"px" });

  // 3) 圆形粒子 (12-20个)
  const pCount = 12 + Math.min(combo, 8);
  for (let i = 0; i < pCount; i++) {
    const angle = (Math.PI * 2 / pCount) * i + Math.random() * .5;
    const dist = 50 + Math.random() * (60 + combo * 5);
    const size = 3 + Math.random() * 7;
    createEl("p-circle", fxLayer, {
      left: cx+"px", top: cy+"px",
      width: size+"px", height: size+"px",
      background: colors[i % colors.length],
      "--tx": Math.cos(angle) * dist + "px",
      "--ty": Math.sin(angle) * dist + "px",
      "--dur": (.4 + Math.random() * .3) + "s"
    });
  }

  // 4) 方形碎片 (6-12个)
  for (let i = 0; i < 6 + Math.min(combo, 6); i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 80;
    const w = 4 + Math.random() * 8, h = 3 + Math.random() * 6;
    createEl("p-shard", fxLayer, {
      left: cx+"px", top: cy+"px",
      width: w+"px", height: h+"px",
      background: colors[Math.floor(Math.random() * colors.length)],
      "--tx": Math.cos(angle) * dist + "px",
      "--ty": Math.sin(angle) * dist + "px",
      "--rot": (180 + Math.random() * 540) + "deg",
      "--dur": (.45 + Math.random() * .35) + "s",
      transform: `rotate(${Math.random()*360}deg)`
    });
  }

  // 5) 气球橡胶碎片 (4-6个)
  for (let i = 0; i < 4 + Math.floor(Math.random() * 3); i++) {
    const angle = Math.random() * Math.PI * 2;
    const tx = Math.cos(angle) * (20 + Math.random() * 40);
    createEl("p-fragment", fxLayer, {
      left: cx+"px", top: cy+"px",
      width: (8 + Math.random() * 12) + "px",
      height: (5 + Math.random() * 8) + "px",
      background: t.body,
      opacity: ".7",
      "--tx": tx + "px",
      "--fy": (60 + Math.random() * 80) + "px",
      "--rot": (90 + Math.random() * 270) + "deg",
      "--dur": (.6 + Math.random() * .4) + "s"
    });
  }

  // 6) 光线拖尾 (combo>=4)
  if (combo >= 4) {
    for (let i = 0; i < Math.min(combo, 10); i++) {
      const angle = (Math.PI * 2 / Math.min(combo, 10)) * i;
      createEl("light-trail", fxLayer, {
        left: cx+"px", top: cy+"px",
        background: `linear-gradient(to bottom, ${t.shine}, transparent)`,
        transform: `rotate(${angle}rad)`,
        "--len": (20 + Math.random() * 30) + "px"
      });
    }
  }

  // 音效
  playPop(combo);

  // 安慰语
  showComfort();

  // 清理 FX DOM
  setTimeout(() => {
    while (fxLayer.children.length > 60) fxLayer.removeChild(fxLayer.firstChild);
  }, 1000);
}

function createEl(className, parent, styles) {
  const el = document.createElement("div");
  el.className = className;
  for (const [k, v] of Object.entries(styles)) {
    if (k.startsWith("--")) el.style.setProperty(k, v);
    else el.style[k] = v;
  }
  parent.appendChild(el);
  el.addEventListener("animationend", () => el.remove(), { once: true });
  return el;
}

function showComboText(x, y, c) {
  const texts = [
    "", "", "",
    "NICE! ×3", "GREAT! ×4", "AWESOME! ×5",
    "AMAZING! ×6", "FANTASTIC! ×7", "🔥 INSANE! ×8",
    "⚡ GODLIKE! ×9", "💥 LEGENDARY! ×10"
  ];
  const label = c < texts.length ? texts[c] : `💥 ×${c} UNSTOPPABLE!`;
  const size = Math.min(18 + c * 2, 38);
  const hue = (c * 30) % 360;
  const el = document.createElement("div");
  el.className = "combo-text";
  el.textContent = label;
  el.style.left = x + "px";
  el.style.top = (y - 20) + "px";
  el.style.fontSize = size + "px";
  el.style.color = `hsl(${hue},90%,65%)`;
  el.style.setProperty("--glow", `hsla(${hue},90%,55%,.6)`);
  document.body.appendChild(el);
  el.addEventListener("animationend", () => el.remove());
}

function showComfort() {
  document.querySelectorAll(".comfort-card").forEach(c => {
    c.classList.add("out");
    setTimeout(() => c.remove(), 300);
  });

  let idx;
  do { idx = Math.floor(Math.random() * COMFORTS.length); } while (idx === lastIdx);
  lastIdx = idx;
  const item = COMFORTS[idx];
  currentComfort = item;

  const card = document.createElement("div");
  card.className = "comfort-card";
  card.innerHTML = `
    <div class="emoji">${item.emoji}</div>
    <div class="category-tag">#${item.cat}</div>
    <div class="text">${item.text}</div>
    <div class="card-actions">
      <button class="btn btn-share" onclick="generateShareImage()">📸 生成分享图</button>
      <button class="btn btn-close" id="closeCardBtn">继续戳</button>
    </div>
  `;
  document.body.appendChild(card);
  spawnConfetti(20);

  const closeBtn = card.querySelector("#closeCardBtn");
  const closeCard = () => {
    card.classList.add("out");
    setTimeout(() => card.remove(), 300);
  };
  closeBtn.addEventListener("click", (e) => { e.stopPropagation(); closeCard(); });

  // 点击空白关闭
  const bgClose = (e) => {
    if (e.target.closest(".comfort-card") || e.target.closest(".balloon") || e.target.closest(".share-overlay")) return;
    closeCard();
    document.removeEventListener("click", bgClose);
  };
  setTimeout(() => document.addEventListener("click", bgClose), 150);

  // 5秒自动关闭
  setTimeout(() => {
    if (card.parentNode && !card.classList.contains("out")) {
      closeCard();
      document.removeEventListener("click", bgClose);
    }
  }, 5000);
}

function spawnConfetti(n = 20) {
  const colors = ["#FF6B8A","#7C5CFC","#00C9A7","#FFB347","#FF6F61","#4FC3F7","#E040FB","#FFD54F","#69F0AE","#F48FB1"];
  for (let i = 0; i < n; i++) {
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.left = (5 + Math.random() * 90) + "vw";
    c.style.top = -10 + "px";
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.borderRadius = Math.random() > .5 ? "50%" : (Math.random() > .5 ? "2px" : "0");
    c.style.width = (4 + Math.random() * 8) + "px";
    c.style.height = (6 + Math.random() * 14) + "px";
    c.style.setProperty("--dur", (1.5 + Math.random() * 2.5) + "s");
    c.style.setProperty("--rot", (360 + Math.random() * 1080) + "deg");
    c.style.animationDelay = (Math.random() * .5) + "s";
    document.body.appendChild(c);
    c.addEventListener("animationend", () => c.remove());
  }
}

// ═══════════════════════════════════════
//  音效系统
// ═══════════════════════════════════════
function playPop(comboLevel) {
  try {
    const ctx = getAudioCtx();
    const now = ctx.currentTime;

    // 爆破噪声
    const len = .06 + Math.min(comboLevel * .005, .04);
    const buf = ctx.createBuffer(1, ctx.sampleRate * len, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.5);
    }
    const noise = ctx.createBufferSource();
    noise.buffer = buf;
    const hp = ctx.createBiquadFilter();
    hp.type = "highpass";
    hp.frequency.value = 800 + comboLevel * 100;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(.25, now);
    gain.gain.exponentialRampToValueAtTime(.001, now + len);
    noise.connect(hp).connect(gain).connect(ctx.destination);
    noise.start(now); noise.stop(now + len);

    // 连击加上音调升高的泛音
    if (comboLevel >= 3) {
      const osc = ctx.createOscillator();
      const gOsc = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = 600 + comboLevel * 80;
      gOsc.gain.setValueAtTime(.08, now);
      gOsc.gain.exponentialRampToValueAtTime(.001, now + .12);
      osc.connect(gOsc).connect(ctx.destination);
      osc.start(now); osc.stop(now + .12);
    }
  } catch (e) {}
}

  bgGrad.addColorStop(.7, "#1e1645");

  // 装饰光晕 — 左上

  g1.addColorStop(1, "rgba(255,107,193,0)");

  // 装饰光晕 — 右下

  ctx.fillRect(cardX, cardY, cardW, cardH);
  // 卡片内部渐变
  const cardGrad = ctx.createLinearGradient(cardX, cardY, cardX + cardW, cardY + cardH);
  cardGrad.addColorStop(0, "rgba(255,255,255,.04)");
  cardGrad.addColorStop(1, "rgba(255,255,255,.01)");
  ctx.fillStyle = cardGrad;
  ctx.fillRect(cardX, cardY, cardW, cardH);
  ctx.restore();
  // 卡片描边

  ctx.strokeStyle = "rgba(255,255,255,.12)";
  ctx.lineWidth = 1.5;

  ctx.restore();

  // Emoji
  ctx.font = "64px serif";
  ctx.textAlign = "center";
  ctx.fillText(currentComfort.emoji, W / 2, cardY + 90);

  // 分类标签
  ctx.font = "500 16px 'PingFang SC','Microsoft YaHei',sans-serif";

  ctx.fillStyle = "rgba(255,255,255,.45)";

  // 安慰语主文

  // 顶部标题
  ctx.font = "800 36px 'PingFang SC','Microsoft YaHei',sans-serif";
  const titleGrad = ctx.createLinearGradient(W/2 - 150, 0, W/2 + 150, 0);
  titleGrad.addColorStop(0, "#ff6bc1");

  // 底部 CTA
  // 圆角底栏

  ctx.font = "600 20px 'PingFang SC','Microsoft YaHei',sans-serif";
  ctx.fillStyle = "rgba(255,255,255,.7)";

  // 顶部小装饰气球
  drawMiniBalloon(ctx, 80, 60, 18, "#FF6B8A");
  drawMiniBalloon(ctx, 670, 45, 14, "#7C5CFC");
  drawMiniBalloon(ctx, 620, 85, 10, "#FFB347");
  drawMiniBalloon(ctx, 130, 170, 12, "#00C9A7");
  drawMiniBalloon(ctx, 630, 170, 15, "#E040FB");

  // ── 弹出分享面板 ──
  showShareOverlay(canvas);
}

function drawMiniBalloon(ctx, x, y, r, color) {
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(x, y, r * .82, r, 0, 0, Math.PI * 2);
  const g = ctx.createRadialGradient(x - r*.25, y - r*.3, 0, x, y, r);
  g.addColorStop(0, lighten(color, 40));
  g.addColorStop(.7, color);
  g.addColorStop(1, darken(color, 25));
  ctx.fillStyle = g;
  ctx.fill();
  // 高光
  ctx.beginPath();
  ctx.ellipse(x - r*.2, y - r*.35, r*.25, r*.35, -.4, 0, Math.PI * 2);
  ctx.fillStyle = "rgba(255,255,255,.25)";
  ctx.fill();
  // 线
  ctx.beginPath();
  ctx.moveTo(x, y + r);
  ctx.quadraticCurveTo(x - 2, y + r + 8, x + 1, y + r + 16);
  ctx.strokeStyle = "rgba(255,255,255,.2)";
  ctx.lineWidth = .8;
  ctx.stroke();
  ctx.restore();
}

function lighten(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) + Math.floor(255 * pct / 100);
  let g = ((num >> 8) & 0xff) + Math.floor(255 * pct / 100);
  let b = (num & 0xff) + Math.floor(255 * pct / 100);
  r = Math.min(255, r); g = Math.min(255, g); b = Math.min(255, b);
  return `rgb(${r},${g},${b})`;
}
function darken(hex, pct) {
  const num = parseInt(hex.slice(1), 16);
  let r = (num >> 16) - Math.floor(255 * pct / 100);
  let g = ((num >> 8) & 0xff) - Math.floor(255 * pct / 100);
  let b = (num & 0xff) - Math.floor(255 * pct / 100);
  r = Math.max(0, r); g = Math.max(0, g); b = Math.max(0, b);
  return `rgb(${r},${g},${b})`;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, x, y, maxW, lineH) {
  let line = "";
  for (let i = 0; i < text.length; i++) {
    const test = line + text[i];
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, y);
      line = text[i]; y += lineH;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}

// ═══════════════════════════════════════
//  分享弹窗
// ═══════════════════════════════════════
function showShareOverlay(canvas) {
  // 移除旧的
  document.querySelectorAll(".share-overlay").forEach(o => o.remove());

  const overlay = document.createElement("div");
  overlay.className = "share-overlay";
  overlay.innerHTML = `
    <div class="share-actions">
      <button class="btn btn-download" id="dlBtn">📥 保存到相册</button>
      <button class="btn btn-back" id="backBtn">↩ 继续戳</button>
    </div>
    <div class="share-tip">长按图片可保存 · 分享到朋友圈让更多人收获温暖</div>
  `;
  overlay.insertBefore(canvas, overlay.firstChild);
  document.body.appendChild(overlay);

  overlay.querySelector("#dlBtn").addEventListener("click", () => {
    const link = document.createElement("a");
    link.download = `戳破烦恼-${score}个.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  });

  overlay.querySelector("#backBtn").addEventListener("click", () => {
    overlay.style.opacity = "0";
    setTimeout(() => overlay.remove(), 300);
  });

  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) {
      overlay.style.opacity = "0";
      setTimeout(() => overlay.remove(), 300);
    }
  });
}
